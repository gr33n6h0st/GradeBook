<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EliteMark // Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-cyan: #00f2ff;
            --ui-magenta: #bc13fe;
            --ui-amber: #ffb700;
            --ui-red: #ff3131;
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-deep); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar: Restored Multi-Class Support */
        nav { width: 250px; background: #080a0d; border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: transparent; border: 1px solid transparent; color: #64748b; cursor: pointer; text-align: left; font-size: 0.85rem; border-radius: 4px; font-family: 'Orbitron'; }
        .active-nav { color: var(--ui-cyan); border-color: var(--ui-cyan); background: rgba(0,242,255,0.05); }

        main { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Table Layout */
        .matrix-container { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        th:first-child, td:first-child { position: sticky; left: 0; background: #111821; z-index: 5; min-width: 200px; }
        th { background: #161e27; font-family: 'Orbitron'; font-size: 0.6rem; color: var(--ui-cyan); text-align: center; }

        [contenteditable] { outline: none; padding: 8px; border-radius: 3px; border: 1px solid transparent; }
        [contenteditable]:focus { background: rgba(255,255,255,0.05); border-color: var(--ui-cyan); }
        
        .score-cell { font-family: 'Orbitron'; color: var(--ui-amber); text-align: center; font-size: 1.1rem; }
        .name-cell { font-weight: 600; color: #fff; cursor: pointer; }
        .name-cell:hover { color: var(--ui-cyan); text-decoration: underline; }
        
        .comment-field { background: #05070a; border: 1px solid #2d333b; border-radius: 4px; min-height: 40px; min-width: 200px; font-size: 0.75rem; color: #94a3b8; margin-top: 5px; }

        .avg-cell { font-family: 'Orbitron'; font-weight: 700; text-align: center; font-size: 1.1rem; }
        .fail { color: var(--ui-red) !important; }

        /* Bottom Graph Panel */
        #student-analysis { background: var(--bg-card); border: 1px solid var(--ui-magenta); border-radius: 6px; padding: 15px; margin-top: 20px; display: none; }

        .btn { padding: 8px 12px; background: transparent; border: 1px solid var(--ui-cyan); color: var(--ui-cyan); font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: var(--ui-cyan); color: #000; }
        .del-x { color: var(--ui-red); cursor: pointer; opacity: 0.2; margin-right: 8px; }
        .del-x:hover { opacity: 1; }
    </style>
</head>
<body>

<nav>
    <div style="font-family:'Orbitron'; font-size: 0.7rem; color: var(--ui-cyan); margin-bottom: 1rem;">ELITEMARK_V26</div>
    <button class="btn" style="margin-bottom:1.5rem" onclick="addNewClass()">+ New Class</button>
    <div id="class-list" style="flex-grow:1"></div>
    <div style="padding-top:1rem; border-top:1px solid var(--border)">
        <button class="btn" style="width:100%; margin-bottom:8px;" onclick="exportToFile()">Download Backup</button>
        <button class="btn" style="width:100%; border-color: var(--ui-magenta); color: var(--ui-magenta);" onclick="document.getElementById('fileInput').click()">Load Backup</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">
    </div>
</nav>

<main>
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <h1 id="class-title" style="font-family:'Orbitron';">---</h1>
        <div style="display:flex; gap:10px">
            <button class="btn" onclick="addAssignment()">+ Assignment</button>
            <button class="btn" onclick="addStudent()">+ Student</button>
        </div>
    </div>

    <div class="matrix-container">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="student-analysis">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div id="chart-title" style="font-family:'Orbitron'; font-size:0.7rem; color:var(--ui-magenta);">DATA_VISUALIZATION</div>
            <button class="btn" style="border-color:var(--ui-magenta); color:var(--ui-magenta);" onclick="closeChart()">CLOSE ×</button>
        </div>
        <div style="height: 200px;"><canvas id="studentChart"></canvas></div>
    </div>
</main>

<script>
    let activeClass = 'TEJ3M';
    let myChart = null;
    let currentVisibleStudent = null;

    // Load multiple classes from storage
    let data = JSON.parse(localStorage.getItem('eliteMark_v26')) || {
        'TEJ3M': { tasks: [{n: "Project 1", w: 100}], students: [{n: "Student 1", s: [0], c: [""]}] },
        'TDJ1O': { tasks: [{n: "Lab 1", w: 100}], students: [{n: "Student 2", s: [0], c: [""]}] }
    };

    // TAB and ENTER support
    document.addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === 'Tab') && e.target.hasAttribute('contenteditable')) {
            if (e.key === 'Enter') e.preventDefault(); 
            e.target.blur(); // Triggers the 'onblur' update
        }
    });

    function sync() { localStorage.setItem('eliteMark_v26', JSON.stringify(data)); }

    function render() {
        const list = document.getElementById('class-list');
        list.innerHTML = '';
        Object.keys(data).forEach(c => {
            list.innerHTML += `<div style="display:flex; align-items:center; gap:5px;">
                <span class="del-x" style="opacity:0.1" onclick="deleteClass('${c}')">×</span>
                <button class="nav-btn ${c===activeClass?'active-nav':''}" style="flex-grow:1" onclick="activeClass='${c}';closeChart();render()">${c}</button>
            </div>`;
        });

        const current = data[activeClass];
        document.getElementById('class-title').innerText = activeClass;

        let h = `<tr><th>Student Name</th>`;
        current.tasks.forEach((t, i) => {
            h += `<th>
                <span class="del-x" onclick="delTask(${i})">×</span>
                <span contenteditable onblur="data['${activeClass}'].tasks[${i}].n=this.innerText;sync()">${t.n}</span>
                <div style="font-size:0.5rem; color:var(--ui-cyan)" contenteditable onblur="updateWeight(${i}, this.innerText)">${t.w}%</div>
            </th>`;
        });
        h += `<th>Final Avg</th></tr>`;
        document.getElementById('thead').innerHTML = h;

        let b = '';
        current.students.forEach((s, si) => {
            let rowAvg = 0;
            b += `<tr><td class="name-cell">
                <span class="del-x" onclick="delStudent(${si})">×</span>
                <span onclick="toggleChart(${si})">${s.n}</span>
            </td>`;
            current.tasks.forEach((t, ti) => {
                rowAvg += ((s.s[ti] || 0) * (t.w / 100));
                b += `<td>
                    <div class="score-cell" contenteditable onblur="updateScore(${si}, ${ti}, this.innerText)">${s.s[ti] || 0}</div>
                    <div class="comment-field" contenteditable onblur="data['${activeClass}'].students[${si}].c[${ti}]=this.innerText;sync()">${s.c[ti] || ""}</div>
                </td>`;
            });
            const failClass = rowAvg < 50 ? 'fail' : '';
            b += `<td class="avg-cell ${failClass}">${rowAvg.toFixed(1)}%</td></tr>`;
        });
        document.getElementById('tbody').innerHTML = b;
    }

    function toggleChart(si) { (currentVisibleStudent === si) ? closeChart() : showChart(si); }

    function showChart(si) {
        currentVisibleStudent = si;
        const s = data[activeClass].students[si];
        document.getElementById('student-analysis').style.display = 'block';
        document.getElementById('chart-title').innerText = s.n.toUpperCase() + " // GRADE_TREND_BARS";
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('studentChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: data[activeClass].tasks.map(t => t.n), datasets: [{ data: s.s, backgroundColor: 'rgba(188, 19, 254, 0.3)', borderColor: '#bc13fe', borderWidth: 1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, x: { ticks: { color: '#64748b' } } } }
        });
        document.getElementById('student-analysis').scrollIntoView({ behavior: 'smooth' });
    }

    function closeChart() { document.getElementById('student-analysis').style.display = 'none'; currentVisibleStudent = null; }
    function updateScore(si, ti, val) { data[activeClass].students[si].s[ti] = parseFloat(val) || 0; sync(); render(); }
    function updateWeight(ti, val) { data[activeClass].tasks[ti].w = parseInt(val) || 0; sync(); render(); }
    function addNewClass() { let n = prompt("Class Name (e.g. ENG4U):"); if(n){ data[n] = {tasks:[], students:[]}; activeClass=n; sync(); render(); } }
    function deleteClass(c) { if(confirm("Delete entire class?")) { delete data[c]; activeClass=Object.keys(data)[0]; sync(); render(); } }
    function addStudent() { data[activeClass].students.push({n: "New Student", s: data[activeClass].tasks.map(()=>0), c: data[activeClass].tasks.map(()=>"")}); sync(); render(); }
    function addAssignment() { data[activeClass].tasks.push({n: "New Task", w: 0}); data[activeClass].students.forEach(s => { s.s.push(0); s.c.push(""); }); sync(); render(); }
    function delTask(i) { data[activeClass].tasks.splice(i,1); data[activeClass].students.forEach(s => { s.s.splice(i,1); s.c.splice(i,1); }); sync(); render(); }
    function delStudent(i) { data[activeClass].students.splice(i,1); sync(); render(); }
    function exportToFile() { const blob = new Blob([JSON.stringify(data)], {type: "text/plain"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Grades_Backup.txt`; a.click(); }
    function importFromFile(e) { const reader = new FileReader(); reader.onload = function(ev) { data = JSON.parse(ev.target.result); sync(); render(); }; reader.readAsText(e.target.files[0]); }

    window.onload = render;
</script>
</body>
</html>
