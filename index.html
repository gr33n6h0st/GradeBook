<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMark Elite // Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-deep: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; transition: background 0.2s, border 0.2s; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden;
        }

        /* Side Navigation */
        nav { 
            width: 260px; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); letter-spacing: 2px; margin-bottom: 3rem; font-size: 1.1rem; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        
        .nav-btn { 
            width: 100%; padding: 14px; margin-bottom: 12px; background: transparent; border: 1px solid transparent;
            color: #94a3b8; cursor: pointer; text-align: left; border-radius: 12px; font-weight: 600;
        }
        .nav-btn:hover { border-color: var(--neon-cyan); color: white; }
        .active-nav { background: var(--glass); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.1); }

        /* Workspace */
        main { flex: 1; padding: 3rem; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--neon-cyan) transparent; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        h1 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 1.8rem; text-transform: uppercase; }

        /* The Grid */
        .glass-card { background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(10px); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 12px 20px; font-size: 0.7rem; text-transform: uppercase; color: var(--neon-cyan); letter-spacing: 2px; opacity: 0.8; }
        
        /* Grade Units */
        .grade-unit { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-width: 120px; }
        .grade-unit:focus-within { border-color: var(--neon-cyan); background: rgba(0,242,255,0.03); }
        
        [contenteditable] { outline: none; border: none; background: transparent; color: white; width: 100%; }
        .score-input { font-family: 'Orbitron'; font-weight: 700; font-size: 1.1rem; text-align: center; }
        .note-input { font-size: 0.7rem; color: #64748b; font-style: italic; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 4px; }
        
        .final-display { font-family: 'Orbitron'; font-weight: 700; color: var(--neon-magenta); font-size: 1.3rem; text-shadow: 0 0 10px rgba(188,19,254,0.3); }

        /* Controls */
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .btn-cyan { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #94a3b8; }
        .btn-outline:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .btn-danger { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

        /* Analytics Overlay */
        .analytics-grid { display: grid; grid-template-columns: 320px 1fr; gap: 4rem; padding: 1rem; align-items: center; }
        .stat-circle { border-left: 4px solid var(--neon-cyan); padding-left: 20px; }
        .big-mark { font-family: 'Orbitron'; font-size: 4rem; margin: 0; color: var(--neon-cyan); line-height: 1; }

        /* Utility */
        .edit-mode .delete-trigger { display: inline-block !important; }
        .delete-trigger { display: none; color: #f87171; margin-right: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="main-body">

<nav>
    <div class="logo">TERMINAL // GRD-BK</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">TEJ3M // COMP ENG</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">TDJ1O // TECH DESIGN</button>
    </div>
    <button class="btn btn-cyan" style="width: 100%;" onclick="saveData()">💾 DATA SYNC</button>
</nav>

<main>
    <div class="header">
        <div>
            <h1 id="view-title">COMPUTER ENGINEERING</h1>
            <p style="color: #64748b; margin-top: 5px; font-size: 0.8rem; letter-spacing: 1px;">SEMESTER II // ONTARIO SECONDARY</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-outline" id="edit-toggle" onclick="toggleEditMode()">🛠️ CONTROL MODE</button>
            <button class="btn btn-outline" onclick="addAssignment()">+ PROJECT</button>
            <button class="btn btn-cyan" onclick="addStudent()">+ STUDENT</button>
        </div>
    </div>

    <div class="glass-card">
        <table id="main-grid">
            <thead id="g-head"></thead>
            <tbody id="g-body"></tbody>
        </table>
    </div>

    <div id="ana-card" class="glass-card" style="display: none; border-color: var(--neon-cyan);">
        <div class="analytics-grid">
            <div class="stat-circle">
                <p style="font-size: 0.7rem; font-weight: 700; color: var(--neon-cyan); text-transform: uppercase;">Student Vector Performance</p>
                <h2 id="ana-name" style="margin: 10px 0; font-weight: 400;">Student Name</h2>
                <div class="big-mark" id="ana-final">0%</div>
            </div>
            <div style="height: 280px; position: relative;">
                <canvas id="neonChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let chartInstance = null;
    let editMode = false;

    let db = JSON.parse(localStorage.getItem('techmark_elite_v8')) || {
        'TEJ3M': {
            tasks: [{name: "Breadboard Logic", w: 25}, {name: "Arduino I/O", w: 25}],
            students: [{name: "Marcus Vane", scores: [{g: 88, n: "Clean wiring"}, {g: 92, n: "Complex code"}]}]
        },
        'TDJ1O': {
            tasks: [{name: "Technical Sketch", w: 40}],
            students: [{name: "Elena Rodriguez", scores: [{g: 95, n: "Perfect perspective"}]}]
        }
    };

    function toggleEditMode() {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode');
        document.getElementById('edit-toggle').style.borderColor = editMode ? 'var(--neon-magenta)' : 'var(--border)';
        render();
    }

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('view-title').innerText = id === 'TEJ3M' ? "COMPUTER ENGINEERING" : "TECHNOLOGICAL DESIGN";
        document.getElementById('ana-card').style.display = 'none';
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('g-head');
        const body = document.getElementById('g-body');

        // Header: Hidden Delete buttons appear only in Edit Mode
        let hContent = `<tr><th>Student Personnel</th>`;
        course.tasks.forEach((t, i) => {
            hContent += `<th>
                <span class="delete-trigger" onclick="deleteTask(${i})">× </span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-cyan); font-size:0.6rem" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}%</div>
            </th>`;
        });
        hContent += `<th>Vector Avg</th><th></th></tr>`;
        head.innerHTML = hContent;

        // Body: Coordinate system added for Enter navigation
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rowHTML = `<td><div contenteditable="true" class="nav-cell" data-r="${sIdx}" data-c="0" onblur="updateSName(${sIdx},this.innerText)" style="font-weight:600">${s.name}</div></td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rowHTML += `<td>
                    <div class="grade-unit">
                        <div contenteditable="true" class="score-input nav-cell" data-r="${sIdx}" data-c="${tIdx+1}" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                        <div contenteditable="true" class="note-input" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "Note..."}</div>
                    </div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            rowHTML += `<td class="final-display" id="final-${sIdx}">${final}%</td>`;
            rowHTML += `<td>
                ${editMode ? `<button class="btn btn-danger" style="padding:5px 10px; font-size:0.5rem" onclick="deleteStudent(${sIdx})">PURGE</button>` : `<button class="btn btn-outline" style="padding:6px 12px; font-size:0.6rem" onclick="viewStats(${sIdx})">ANALYTICS</button>`}
            </td>`;
            
            tr.innerHTML = rowHTML;
            body.appendChild(tr);
        });

        attachEnterLogic();
    }

    // ROBUST ENTER KEY NAVIGATION
    function attachEnterLogic() {
        document.querySelectorAll('.nav-cell').forEach(cell => {
            cell.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    let nextR = parseInt(this.dataset.r) + 1;
                    let currC = this.dataset.c;
                    let nextCell = document.querySelector(`.nav-cell[data-r="${nextR}"][data-c="${currC}"]`);
                    if (nextCell) {
                        nextCell.focus();
                        // Place cursor at the end
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(nextCell);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            });
        });
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        
        let ws = 0; let wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            let g = db[currentClass].students[sIdx].scores[i].g;
            ws += (g * (t.w/100)); wu += (t.w/100);
        });
        document.getElementById(`final-${sIdx}`).innerText = (wu > 0 ? (ws/wu).toFixed(1) : 0) + "%";
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateSName(i, v) { db[currentClass].students[i].name = v; }

    function addAssignment() {
        db[currentClass].tasks.push({name: "New Project", w: 10});
        db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""}));
        render();
    }

    function addStudent() {
        db[currentClass].students.push({name: "New Student", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))});
        render();
    }

    function deleteTask(i) { if(confirm("Confirm deletion of project vector?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }
    function deleteStudent(i) { if(confirm("Purge student from database?")) { db[currentClass].students.splice(i, 1); render(); } }

    function viewStats(idx) {
        const s = db[currentClass].students[idx];
        document.getElementById('ana-card').style.display = 'block';
        document.getElementById('ana-name').innerText = s.name;
        document.getElementById('ana-final').innerText = document.getElementById(`final-${idx}`).innerText;

        if(chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('neonChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: db[currentClass].tasks.map(t => t.name),
                datasets: [{
                    data: s.scores.map(g => g.g),
                    borderColor: '#00f2ff',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 242, 255, 0.05)',
                    pointBackgroundColor: '#00f2ff',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });
        document.getElementById('ana-card').scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() { localStorage.setItem('techmark_elite_v8', JSON.stringify(db)); alert("DATABASE SYNC SUCCESSFUL."); }
    window.onload = render;
</script>
</body>
</html>
