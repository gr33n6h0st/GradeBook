<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMark Elite | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-black: #05070a;
            --border: rgba(0, 242, 255, 0.15);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-black); color: var(--text-main); height: 100vh; overflow: hidden;
        }

        /* Sidebar Navigation */
        nav { 
            width: 280px; background: rgba(0,0,0,0.95); border-right: 1px solid var(--border);
            padding: 2rem; display: flex; flex-direction: column;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-cyan); margin-bottom: 3rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav-btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid transparent;
            color: var(--text-dim); cursor: pointer; text-align: left; font-size: 0.85rem; border-radius: 4px; transition: 0.2s;
        }
        .active-nav { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,242,255,0.05); }

        /* Workspace */
        main { flex: 1; padding: 3rem; overflow-y: auto; background-image: radial-gradient(circle at top right, #0a1018, #05070a); }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin: 0; text-transform: uppercase; }

        /* The Table Grid */
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; color: var(--neon-cyan); text-transform: uppercase; border-bottom: 2px solid var(--border); position: relative; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        
        /* Interactive Deletion "X" */
        .delete-trigger { position: absolute; color: #ff4d4d; cursor: pointer; opacity: 0; transition: 0.2s; font-weight: bold; font-size: 0.9rem; }
        .delete-assignment { top: 5px; right: 5px; }
        .delete-student { left: -15px; top: 50%; transform: translateY(-50%); }
        
        th:hover .delete-assignment, td:hover .delete-student { opacity: 0.6; }
        .delete-trigger:hover { opacity: 1 !important; }

        /* Professional Inputs */
        [contenteditable] { outline: none; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; transition: 0.1s; border: 1px solid transparent; }
        [contenteditable]:focus { background: rgba(0,242,255,0.08); border-color: var(--neon-cyan); }
        .score-input { font-family: 'Orbitron'; font-weight: 700; font-size: 1.1rem; text-align: center; width: 85px; }
        .comment-input { font-size: 0.75rem; color: var(--text-dim); font-style: italic; display: block; margin-top: 6px; min-width: 220px; }

        .final-average-text { font-family: 'Orbitron'; color: var(--neon-magenta); font-weight: 700; font-size: 1.2rem; }

        /* Buttons */
        .btn { padding: 12px 24px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* Diagnostics & Separated Logs */
        .diagnostics-panel { display: grid; grid-template-columns: 350px 1fr; gap: 3rem; background: rgba(0,0,0,0.85); border: 1px solid var(--neon-magenta); padding: 2.5rem; border-radius: 12px; border-left: 5px solid var(--neon-magenta); }
        .log-container { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
        .log-entry { margin-bottom: 15px; padding-left: 10px; border-left: 2px solid var(--neon-cyan); }
        .log-entry-header { color: var(--neon-cyan); font-weight: 700; font-family: 'Orbitron'; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 3px; }
        .log-entry-text { font-size: 0.85rem; line-height: 1.4; color: var(--text-main); }
        
        .chart-container { background: #000; border: 1px solid var(--border); padding: 25px; height: 380px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Terminal Gradebook</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">Computer Engineering</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">Technological Design</button>
    </div>
    <button class="btn" style="width: 100%;" onclick="saveData()">Save Database</button>
</nav>

<main>
    <div class="header">
        <div>
            <h1 id="view-title">Computer Engineering</h1>
            <p style="color: var(--neon-cyan); font-size: 0.65rem; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase;">Ontario Secondary Marking Standards</p>
        </div>
        <div style="display:flex; gap:15px">
            <button class="btn" onclick="addAssignment()">+ Add Assignment</button>
            <button class="btn" onclick="addStudent()">+ Add Student</button>
        </div>
    </div>

    <div class="glass-card">
        <table id="main-grade-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="diagnostics-panel" class="diagnostics-panel" style="display:none;">
        <div>
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-magenta); letter-spacing: 1px;">Individual Analysis</span>
            <h2 id="diagnostics-name" style="margin:10px 0; font-weight:400; font-size:2rem;">---</h2>
            <div id="diagnostics-final" style="font-family:'Orbitron'; font-size:4.5rem; color:var(--neon-cyan); line-height: 1;">0%</div>
            
            <div class="log-container" id="diagnostics-logs">
                </div>
        </div>
        <div class="chart-container">
            <canvas id="diagnosticsChart"></canvas>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let chartInstance = null;

    let db = JSON.parse(localStorage.getItem('techmark_v12')) || {
        'TEJ3M': {
            tasks: [{name: "Breadboard Logic", w: 25}, {name: "Arduino Integration", w: 25}],
            students: [{name: "Marcus Vane", scores: [{g: 82, n: "Needs to verify wire continuity before testing."}, {g: 94, n: "Code structure is modular and efficient."}]}]
        },
        'TDJ1O': {
            tasks: [{name: "3D Rendering", w: 50}],
            students: [{name: "Elena Rodriguez", scores: [{g: 88, n: "Lighting setup creates realistic depth."}]}]
        }
    };

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('diagnostics-panel').style.display = 'none';
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');

        // Header Render
        let hRow = `<tr><th style="width:250px">Student Name</th>`;
        course.tasks.forEach((t, i) => {
            hRow += `<th>
                <span class="delete-trigger delete-assignment" onclick="deleteTask(${i})">×</span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-cyan); font-size:0.6rem; margin-top:4px;" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}% Weight</div>
            </th>`;
        });
        hRow += `<th>Weighted Average</th><th></th></tr>`;
        head.innerHTML = hRow;

        // Body Render
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rowHTML = `<td>
                <span class="delete-trigger delete-student" onclick="deleteStudent(${sIdx})">×</span>
                <div contenteditable="true" class="keyboard-nav-target" onblur="updateStudentName(${sIdx},this.innerText)" style="font-weight:600; color:var(--neon-cyan)">${s.name}</div>
            </td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rowHTML += `<td>
                    <div contenteditable="true" class="score-input keyboard-nav-target" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                    <div contenteditable="true" class="comment-input" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "Anecdotal evidence..."}</div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            rowHTML += `<td class="final-average-text" id="final-${sIdx}">${final}%</td>`;
            rowHTML += `<td><button class="btn" style="font-size:0.6rem; padding:8px 12px;" onclick="viewDiagnostics(${sIdx})">Diagnostics</button></td>`;
            
            tr.innerHTML = rowHTML;
            body.appendChild(tr);
        });

        setupEnterKey();
    }

    function setupEnterKey() {
        const table = document.getElementById('main-grade-table');
        table.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cell = e.target;
                const td = cell.closest('td');
                const row = td.parentElement;
                const colIndex = Array.from(row.cells).indexOf(td);
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    const target = nextRow.cells[colIndex].querySelector('.keyboard-nav-target');
                    if (target) target.focus();
                }
            }
        });
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        
        let ws = 0; let wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            ws += (db[currentClass].students[sIdx].scores[i].g * (t.w/100));
            wu += (t.w/100);
        });
        document.getElementById(`final-${sIdx}`).innerText = (wu > 0 ? (ws/wu).toFixed(1) : 0) + "%";
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateStudentName(i, v) { db[currentClass].students[i].name = v; }

    function addAssignment() {
        db[currentClass].tasks.push({name: "New Assignment", w: 10});
        db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""}));
        render();
    }

    function addStudent() {
        db[currentClass].students.push({name: "New Student", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))});
        render();
    }

    function deleteTask(i) { if(confirm("Remove this assignment column and all marks within it?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }
    
    function deleteStudent(i) { if(confirm("Permanently delete this student from the roster?")) { db[currentClass].students.splice(i, 1); render(); } }

    function viewDiagnostics(idx) {
        const s = db[currentClass].students[idx];
        const tasks = db[currentClass].tasks;
        document.getElementById('diagnostics-panel').style.display = 'grid';
        document.getElementById('diagnostics-name').innerText = s.name;
        document.getElementById('diagnostics-final').innerText = document.getElementById(`final-${idx}`).innerText;

        // Render separated comments per project
        const logContainer = document.getElementById('diagnostics-logs');
        logContainer.innerHTML = '';
        s.scores.forEach((score, i) => {
            if(score.n && score.n !== "Anecdotal evidence...") {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<div class="log-entry-header">${tasks[i].name} — Result: ${score.g}%</div><div class="log-entry-text">${score.n}</div>`;
                logContainer.appendChild(entry);
            }
        });

        if(chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('diagnosticsChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tasks.map(t => t.name),
                datasets: [{
                    data: s.scores.map(g => g.g),
                    backgroundColor: 'rgba(0, 242, 255, 0.4)',
                    borderColor: '#00f2ff',
                    borderWidth: 2,
                    barThickness: 40
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        min: 0, max: 100, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { stepSize: 5, color: '#00f2ff', font: { family: 'Orbitron', size: 10 } } 
                    },
                    x: { ticks: { color: '#00f2ff', font: { family: 'Orbitron', size: 10 } } }
                }
            }
        });
        document.getElementById('diagnostics-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() { localStorage.setItem('techmark_v12', JSON.stringify(db)); alert("Local Storage Synchronized Successfully."); }
    window.onload = render;
</script>
</body>
</html>
