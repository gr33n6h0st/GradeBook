<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrade | Ontario Tech Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb; --dark: #0f172a; --accent: #8b5cf6;
            --bg: #f1f5f9; --white: #ffffff; --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); color: #1e293b; }

        /* Sidebar */
        nav { width: 260px; height: 100vh; background: var(--dark); color: white; padding: 2rem 1rem; position: fixed; box-sizing: border-box; z-index: 100; }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; cursor: pointer; text-align: left; }
        .nav-btn:hover, .active-nav { background: var(--primary); border-color: var(--primary); }

        /* Layout */
        main { margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }

        /* Components */
        .card { background: var(--white); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h2 { margin-top: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        [contenteditable="true"] { background: #fffbeb; border-radius: 4px; padding: 4px; outline: none; border: 1px solid transparent; }
        [contenteditable="true"]:focus { border: 1px solid var(--primary); background: #eff6ff; }

        .view-btn { background: var(--bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .view-btn:hover { background: var(--primary); color: white; }

        /* Student Profile Section */
        #profile-section { position: sticky; top: 2rem; }
        .stat-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; background: #dcfce7; color: #166534; font-weight: bold; font-size: 1.2rem; }
        
        .btn-save { background: #10b981; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <h1 style="font-size: 1.5rem; margin-bottom: 2rem;">ProGrade <span style="color: var(--primary);">.</span></h1>
        <button class="nav-btn active-nav" onclick="loadClass('TEJ3M')">Computer Eng (TEJ3M)</button>
        <button class="nav-btn" onclick="loadClass('TDJ1O')">Tech Design (TDJ1O)</button>
        <div style="margin-top: auto;">
            <button class="btn-save" onclick="saveData()">💾 Sync Changes</button>
            <p style="font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 10px;">Data stored in browser local storage</p>
        </div>
    </nav>

    <main>
        <header style="margin-bottom: 2rem;">
            <h1 id="course-title" style="margin:0;">Computer Engineering</h1>
            <span id="course-code" style="color: var(--primary); font-weight: bold;">TEJ3M</span>
        </header>

        <div class="grid">
            <section>
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h2>Class Roster</h2>
                        <button class="view-btn" onclick="addRow()">+ Add Student</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Breadboard/CAD</th>
                                <th>Programming</th>
                                <th>Exam</th>
                                <th>Final</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="grade-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="profile-section">
                <div class="card">
                    <div id="profile-content">
                        <p style="color: #64748b; text-align: center;">Click "View" on a student to see their profile analytics.</p>
                    </div>
                    <canvas id="studentChart" width="400" height="400"></canvas>
                </div>
            </section>
        </div>
    </main>

    <script>
        let currentClass = 'TEJ3M';
        let chartInstance = null;
        
        let db = JSON.parse(localStorage.getItem('prograde_db')) || {
            'TEJ3M': [{ name: "Marcus Vane", p1: 88, p2: 92, exam: 85 }],
            'TDJ1O': [{ name: "Elena Rodriguez", p1: 75, p2: 80, exam: 78 }]
        };

        function loadClass(code) {
            currentClass = code;
            document.getElementById('course-code').innerText = code;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            event?.target.classList.add('active-nav');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('grade-body');
            tbody.innerHTML = '';
            db[currentClass].forEach((s, i) => {
                const final = (( ((s.p1+s.p2)/2)*0.7 ) + (s.exam*0.3)).toFixed(1);
                tbody.innerHTML += `
                    <tr>
                        <td contenteditable="true" onblur="updateData(${i},'name',this.innerText)">${s.name}</td>
                        <td contenteditable="true" onblur="updateData(${i},'p1',this.innerText)">${s.p1}</td>
                        <td contenteditable="true" onblur="updateData(${i},'p2',this.innerText)">${s.p2}</td>
                        <td contenteditable="true" onblur="updateData(${i},'exam',this.innerText)">${s.exam}</td>
                        <td style="font-weight:bold; color:var(--primary)">${final}%</td>
                        <td><button class="view-btn" onclick="viewStudent(${i})">View</button></td>
                    </tr>`;
            });
        }

        function updateData(i, field, val) {
            db[currentClass][i][field] = field === 'name' ? val : (parseFloat(val) || 0);
            renderTable();
        }

        function addRow() {
            db[currentClass].push({ name: "New Student", p1: 0, p2: 0, exam: 0 });
            renderTable();
        }

        function viewStudent(i) {
            const s = db[currentClass][i];
            const final = (( ((s.p1+s.p2)/2)*0.7 ) + (s.exam*0.3)).toFixed(1);
            
            // Calculate Class Average for comparison
            const classAvg = (db[currentClass].reduce((acc, curr) => acc + ((curr.p1+curr.p2)/2 * 0.7 + curr.exam * 0.3), 0) / db[currentClass].length).toFixed(1);

            document.getElementById('profile-content').innerHTML = `
                <h2 style="margin-bottom:5px;">${s.name}</h2>
                <p style="margin-bottom:15px; color:#64748b;">Student ID: #2026-${i+100}</p>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Current Grade</span>
                    <span class="stat-pill">${final}%</span>
                </div>
                <hr style="margin:20px 0; opacity:0.1;">
                <p style="font-size:0.8rem; font-weight:bold; text-transform:uppercase;">Performance Analytics</p>
            `;

            updateChart(s, classAvg);
        }

        function updateChart(student, classAvg) {
            const ctx = document.getElementById('studentChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Breadboard/CAD', 'Programming', 'Summative/Exam'],
                    datasets: [{
                        label: student.name,
                        data: [student.p1, student.p2, student.exam],
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: '#2563eb',
                        pointBackgroundColor: '#2563eb'
                    }, {
                        label: 'Class Average',
                        data: [80, 80, 80], // You can make this dynamic by calculating avg per assignment
                        backgroundColor: 'rgba(148, 163, 184, 0.1)',
                        borderColor: '#94a3b8',
                        borderDash: [5, 5]
                    }]
                },
                options: { 
                    scales: { r: { min: 0, max: 100 } },
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function saveData() {
            localStorage.setItem('prograde_db', JSON.stringify(db));
            alert("Success: Changes synced to GitHub environment local-storage.");
        }

        window.onload = () => loadClass('TEJ3M');
    </script>
</body>
</html>
