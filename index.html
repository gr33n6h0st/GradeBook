<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EliteMark // v35.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-cyan: #00f2ff; --ui-amber: #ffb700; --ui-magenta: #bc13fe;
            --ui-red: #ff3131; --bg-deep: #05070a; --bg-card: #0d1117;
            --border: rgba(0, 242, 255, 0.15);
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-deep); color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }
        
        nav { width: 220px; background: #080a0d; border-right: 1px solid var(--border); padding: 1rem; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid transparent; color: #64748b; cursor: pointer; text-align: left; font-family: 'Orbitron'; font-size: 0.7rem; }
        .active-nav { color: var(--ui-cyan); border-bottom: 1px solid var(--ui-cyan); }
        
        main { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .matrix-container { flex: 1; overflow: auto; border: 1px solid var(--border); background: var(--bg-card); border-radius: 4px; }
        
        table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); width: 160px; min-width: 160px; }
        
        th { position: sticky; top: 0; background: #161e27; z-index: 10; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--ui-cyan); text-align: center; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #111821; z-index: 11; width: 240px; min-width: 240px; }

        [contenteditable] { outline: none; padding: 5px; }
        [contenteditable]:focus { background: rgba(0, 242, 255, 0.08); border-radius: 4px; }
        
        .score-cell { font-family: 'Orbitron'; color: var(--ui-amber); text-align: center; font-size: 1.2rem; }
        .name-row-ctrl { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .name-input { color: #fff; font-weight: 600; flex: 1; }
        
        .icon-btn { background: transparent; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; opacity: 0.6; }
        .icon-btn:hover { opacity: 1; filter: drop-shadow(0 0 5px var(--ui-cyan)); }
        
        .btn { padding: 6px 12px; background: transparent; border: 1px solid var(--ui-cyan); color: var(--ui-cyan); font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 3px; }
        .del-x { color: var(--ui-red); cursor: pointer; font-weight: bold; opacity: 0.4; margin-right: 5px; }

        #graph-panel { height: 320px; background: #080a0d; border-top: 1px solid var(--ui-magenta); padding: 15px; display: none; }
        .stats-badge { font-family: 'Orbitron'; font-size: 0.7rem; padding: 4px 8px; border-radius: 3px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<nav>
    <div style="font-family:'Orbitron'; color:var(--ui-cyan); font-size:0.75rem; margin-bottom:1.5rem;">ELITEMARK_V35</div>
    <div style="display:flex; gap:5px; margin-bottom:1rem;">
        <button class="btn" style="flex:1" onclick="addClass()">+ CLASS</button>
        <button class="btn" style="flex:1" onclick="cloneClass()">CLONE</button>
    </div>
    <div id="class-list" style="flex:1; overflow-y:auto;"></div>
    <button class="btn" onclick="saveData()" style="margin-top:10px">BACKUP DATA</button>
    <button class="btn" onclick="document.getElementById('fileIn').click()" style="margin-top:5px; border-color:#333; color:#555">LOAD DATA</button>
    <input type="file" id="fileIn" style="display:none" onchange="loadData(event)">
</nav>

<main>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h1 id="active-title" style="font-family:'Orbitron'; font-size:1.2rem; margin:0; color:var(--ui-cyan);">---</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="addAssignment()">+ ASSIGNMENT</button>
            <button class="btn" onclick="addStudent()">+ STUDENT</button>
        </div>
    </div>

    <div class="matrix-container">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="graph-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div>
                <span id="chart-label" style="font-family:'Orbitron'; font-size:0.9rem; color:var(--ui-magenta); margin-right:15px;"></span>
                <span id="class-standing" class="stats-badge"></span>
            </div>
            <button class="btn" style="border-color:var(--ui-magenta); color:var(--ui-magenta)" onclick="document.getElementById('graph-panel').style.display='none'">CLOSE ×</button>
        </div>
        <div style="height:210px;"><canvas id="chartObj"></canvas></div>
    </div>
</main>

<script>
    let activeClass = 'TEJ3M';
    let myChart = null;
    let data = JSON.parse(localStorage.getItem('eliteMark_v35')) || {
        'TEJ3M': { tasks: [{n: "Lab 1", w: 100}], students: [{n: "Student Name", s: [0], c: [""]}] }
    };

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.hasAttribute('contenteditable')) {
            e.preventDefault(); e.target.blur();
        }
    });

    function sync() { localStorage.setItem('eliteMark_v35', JSON.stringify(data)); render(); }

    function getStudentAvg(s, tasks) {
        let avg = 0;
        tasks.forEach((t, i) => { avg += ((s.s[i] || 0) * (t.w / 100)); });
        return avg;
    }

    function getClassAvg() {
        const current = data[activeClass];
        if (!current.students.length) return 0;
        let total = current.students.reduce((acc, s) => acc + getStudentAvg(s, current.tasks), 0);
        return total / current.students.length;
    }

    function render() {
        const list = document.getElementById('class-list');
        list.innerHTML = '';
        Object.keys(data).forEach(c => {
            list.innerHTML += `<div style="display:flex; align-items:center;"><span class="del-x" onclick="deleteClass('${c}')">×</span>
                <button class="nav-btn ${c===activeClass?'active-nav':''}" onclick="activeClass='${c}';render()">${c}</button></div>`;
        });

        const current = data[activeClass] || {tasks:[], students:[]};
        document.getElementById('active-title').innerText = activeClass;

        let h = `<tr><th>Personnel</th>`;
        current.tasks.forEach((t, i) => {
            h += `<th>
                <div style="display:flex; align-items:center; justify-content:center;">
                    <span class="del-x" onclick="delTask(${i})">×</span>
                    <button class="icon-btn" style="padding:0; margin-right:5px;" onclick="showAssignmentDist(${i})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ui-cyan)" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/></svg>
                    </button>
                </div>
                <div contenteditable onblur="data['${activeClass}'].tasks[${i}].n=this.innerText;sync()">${t.n}</div>
                <div style="color:var(--ui-cyan); font-size:0.55rem;" contenteditable onblur="data['${activeClass}'].tasks[${i}].w=parseInt(this.innerText)||0;sync()">${t.w}%</div></th>`;
        });
        h += `<th style="width:120px; min-width:120px; color:var(--ui-magenta);">TOTAL AVG</th></tr>`;
        document.getElementById('thead').innerHTML = h;

        let b = '';
        current.students.forEach((s, si) => {
            let avg = getStudentAvg(s, current.tasks);
            b += `<tr><td>
                <div class="name-row-ctrl">
                    <span class="del-x" onclick="delStudent(${si})">×</span>
                    <div class="name-input" contenteditable onblur="data['${activeClass}'].students[${si}].n=this.innerText;sync()">${s.n}</div>
                    <button class="icon-btn" onclick="showGraph(${si})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ui-cyan)" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                    </button>
                </div>
            </td>`;
            current.tasks.forEach((t, ti) => {
                b += `<td><div class="score-cell" contenteditable onblur="data['${activeClass}'].students[${si}].s[${ti}]=parseFloat(this.innerText)||0;sync()">${s.s[ti]||0}</div>
                          <div style="border:1px solid #222; background:#000; font-size:0.7rem; color:#888; margin-top:5px; padding:4px;" contenteditable onblur="data['${activeClass}'].students[${si}].c[${ti}]=this.innerText;sync()">${s.c[ti]||""}</div></td>`;
            });
            b += `<td style="font-family:Orbitron; text-align:center; font-weight:700; color:var(--ui-magenta); font-size:1.1rem;">${avg.toFixed(1)}%</td></tr>`;
        });
        document.getElementById('tbody').innerHTML = b;
    }

    function showGraph(si) {
        document.getElementById('graph-panel').style.display = 'block';
        const current = data[activeClass];
        const s = current.students[si];
        const studentAvg = getStudentAvg(s, current.tasks);
        const classAvg = getClassAvg();
        const diff = studentAvg - classAvg;

        const standingEl = document.getElementById('class-standing');
        standingEl.innerText = `CLASS AVG: ${classAvg.toFixed(1)}% | ${diff >= 0 ? 'ABOVE' : 'BELOW'} BY ${Math.abs(diff).toFixed(1)}%`;
        standingEl.style.color = diff >= 0 ? 'var(--ui-cyan)' : 'var(--ui-red)';

        const labels = [...current.tasks.map(t => t.n), "OVERALL AVG"];
        const scores = [...s.s, studentAvg.toFixed(1)];
        const colors = [...current.tasks.map(() => 'rgba(0, 242, 255, 0.2)'), 'rgba(188, 19, 254, 0.5)'];
        const borders = [...current.tasks.map(() => '#00f2ff'), '#bc13fe'];

        updateChart(labels, scores, colors, borders, s.n.toUpperCase());
    }

    function showAssignmentDist(ti) {
        document.getElementById('graph-panel').style.display = 'block';
        const current = data[activeClass];
        const taskName = current.tasks[ti].n;
        const allScores = current.students.map(s => s.s[ti] || 0);
        
        // Distribution Bins
        const bins = ["0-59", "60-69", "70-79", "80-89", "90-100"];
        const counts = [0, 0, 0, 0, 0];
        allScores.forEach(score => {
            if (score < 60) counts[0]++;
            else if (score < 70) counts[1]++;
            else if (score < 80) counts[2]++;
            else if (score < 90) counts[3]++;
            else counts[4]++;
        });

        document.getElementById('class-standing').innerText = `DISTRIBUTION: ${allScores.length} STUDENTS`;
        document.getElementById('class-standing').style.color = 'var(--ui-cyan)';

        updateChart(bins, counts, 'rgba(0, 242, 255, 0.3)', '#00f2ff', `DISTRIBUTION: ${taskName.toUpperCase()}`, true);
    }

    function updateChart(labels, scores, colors, borders, title, isDist = false) {
        document.getElementById('chart-label').innerText = title;
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chartObj'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ data: scores, backgroundColor: colors, borderColor: borders, borderWidth: 2 }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        min: 0, 
                        max: isDist ? Math.max(...scores) + 1 : 100, 
                        ticks: { stepSize: isDist ? 1 : 5, color: '#64748b' } 
                    },
                    x: { ticks: { color: '#64748b', font: { size: 10 } } }
                }
            }
        });
    }

    function addClass() { let n = prompt("Class Name:"); if(n){ data[n] = {tasks:[], students:[]}; activeClass=n; sync(); } }
    function cloneClass() { let n = prompt("Clone Name:"); if(n){ data[n] = JSON.parse(JSON.stringify(data[activeClass])); data[n].students.forEach(s=>{s.s=s.s.map(()=>0); s.c=s.c.map(()=>"");}); activeClass=n; sync(); } }
    function deleteClass(c) { if(confirm("Purge Class?")){ delete data[c]; activeClass=Object.keys(data)[0]||''; sync(); } }
    function addStudent() { data[activeClass].students.push({n:"New Student", s:data[activeClass].tasks.map(()=>0), c:data[activeClass].tasks.map(()=>"")}); sync(); }
    function delStudent(i) { if(confirm("Delete Student?")){ data[activeClass].students.splice(i,1); sync(); } }
    function addAssignment() { data[activeClass].tasks.push({n:"New Task", w:0}); data[activeClass].students.forEach(s=>{s.s.push(0); s.c.push("");}); sync(); }
    function delTask(i) { if(confirm("Delete Task?")){ data[activeClass].tasks.splice(i,1); data[activeClass].students.forEach(s=>{s.s.splice(i,1); s.c.splice(i,1);}); sync(); } }
    function saveData() { const b = new Blob([JSON.stringify(data)], {type:"text/plain"}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="EliteMark_Backup.txt"; a.click(); }
    function loadData(e) { const r = new FileReader(); r.onload=(ev)=>{data=JSON.parse(ev.target.result); sync();}; r.readAsText(e.target.files[0]); }
    window.onload = render;
</script>
</body>
</html>
