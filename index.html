<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteMark // Tactical HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-black: #020408;
            --hud-grid: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.2);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-black); color: #fff; height: 100vh; overflow: hidden;
        }

        /* Side Deck */
        nav { 
            width: 280px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--border);
            padding: 2.5rem; display: flex; flex-direction: column; z-index: 10;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); margin-bottom: 3rem; letter-spacing: 3px; }
        
        .nav-btn { 
            width: 100%; padding: 15px; margin-bottom: 12px; background: transparent; border: 1px solid transparent;
            color: var(--text-dim); cursor: pointer; text-align: left; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 4px;
        }
        .active-nav { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,242,255,0.05); box-shadow: inset 0 0 10px rgba(0,242,255,0.1); }

        /* Main Theatre */
        main { flex: 1; padding: 4rem; overflow-y: auto; background-image: 
            linear-gradient(var(--hud-grid) 1px, transparent 1px),
            linear-gradient(90deg, var(--hud-grid) 1px, transparent 1px);
            background-size: 40px 40px; }

        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; margin: 0; text-transform: uppercase; color: #fff; }

        /* Grade Matrix */
        .matrix-card { 
            background: rgba(5, 10, 20, 0.9); border: 1px solid var(--border); 
            padding: 2rem; border-radius: 4px; position: relative;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-cyan); border-bottom: 2px solid var(--border); letter-spacing: 1px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Inputs */
        .cell-input { outline: none; background: rgba(255,255,255,0.03); border: 1px solid transparent; padding: 10px; border-radius: 4px; }
        .cell-input:focus { border-color: var(--neon-cyan); background: rgba(0,242,255,0.05); }
        .score-val { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 700; width: 80px; text-align: center; }
        .note-val { font-size: 0.75rem; color: #64748b; font-style: italic; min-width: 200px; display: block; margin-top: 5px; }

        .avg-display { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); font-weight: 700; }

        /* HUD Buttons */
        .btn { padding: 12px 25px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* The HUD Graph Panel */
        .ana-panel { display: grid; grid-template-columns: 350px 1fr; gap: 4rem; margin-top: 3rem; padding: 2rem; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-magenta); border-radius: 8px; }
        .big-data { font-family: 'Orbitron'; font-size: 5rem; color: var(--neon-cyan); margin: 0; line-height: 1; }
        .graph-container { background: #000; border: 1px solid var(--border); padding: 20px; position: relative; height: 350px; }
        
        .delete-btn { color: #ff4d4d; cursor: pointer; float: right; font-size: 0.8rem; margin-top: -10px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MARK_COMMAND // v10.0</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">DATALINK: TEJ3M</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">DATALINK: TDJ1O</button>
    </div>
    <button class="btn" style="width: 100%;" onclick="saveData()">[ COMMIT_TO_STORAGE ]</button>
</nav>

<main>
    <div class="header">
        <div>
            <h1 id="view-title">COMPUTER_ENGINEERING</h1>
            <p style="color: var(--neon-cyan); font-size: 0.6rem; letter-spacing: 2px; margin-top: 5px;">TACTICAL GRADE_MATRIX // SEMESTER II</p>
        </div>
        <div style="display:flex; gap:15px">
            <button class="btn" onclick="addAssignment()">+ ADD_VECTOR</button>
            <button class="btn" onclick="addStudent()">+ ADD_SUBJECT</button>
        </div>
    </div>

    <div class="matrix-card">
        <table id="grade-matrix">
            <thead id="h-row"></thead>
            <tbody id="b-rows"></tbody>
        </table>
    </div>

    <div id="ana-panel" class="ana-panel" style="display:none;">
        <div>
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-magenta);">SUBJECT_PROFILE</span>
            <h2 id="ana-name" style="margin:10px 0; font-size:2rem; font-weight:400;">---</h2>
            <div class="big-data" id="ana-final">0%</div>
            <p style="color:var(--text-dim); font-size:0.8rem; margin-top:15px; border-top:1px solid var(--border); padding-top:15px;" id="ana-comments"></p>
        </div>
        <div class="graph-container">
            <canvas id="hudBarChart"></canvas>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let myChart = null;

    let db = JSON.parse(localStorage.getItem('tech_hud_v10')) || {
        'TEJ3M': {
            tasks: [{name: "NETWORK_PROTO", w: 20}, {name: "SERVER_DEPLOY", w: 30}],
            students: [{name: "Marcus Vane", scores: [{g: 82, n: "Understands handshake"}, {g: 94, n: "Rapid deployment"}]}]
        },
        'TDJ1O': {
            tasks: [{name: "CAD_RENDER", w: 50}],
            students: [{name: "Elena Rodriguez", scores: [{g: 88, n: "High mesh quality"}]}]
        }
    };

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('ana-panel').style.display = 'none';
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('h-row');
        const body = document.getElementById('b-rows');

        // Header
        let hHTML = `<tr><th style="width:250px">Subject Name</th>`;
        course.tasks.forEach((t, i) => {
            hHTML += `<th>
                <span class="delete-btn" onclick="deleteTask(${i})">[PURGE]</span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-cyan); font-size:0.6rem" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}%_WT</div>
            </th>`;
        });
        hHTML += `<th>Final_Avg</th><th></th></tr>`;
        head.innerHTML = hHTML;

        // Rows
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rHTML = `<td contenteditable="true" class="cell-input nav-target" data-col="0" onblur="updateSName(${sIdx},this.innerText)" style="font-weight:700; color:var(--neon-cyan)">${s.name}</td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rHTML += `<td>
                    <div contenteditable="true" class="cell-input score-val nav-target" data-col="${tIdx+1}" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                    <div contenteditable="true" class="cell-input note-val" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "ANEKDOTAL_LOG..."}</div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            rHTML += `<td class="avg-display" id="final-${sIdx}">${final}%</td>`;
            rHTML += `<td><button class="btn" style="font-size:0.5rem;" onclick="viewStats(${sIdx})">DIAGNOSTICS</button></td>`;
            
            tr.innerHTML = rHTML;
            body.appendChild(tr);
        });

        setupEnterKey();
    }

    function setupEnterKey() {
        const table = document.getElementById('grade-matrix');
        table.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cell = e.target;
                const row = cell.closest('tr');
                const colIndex = Array.from(row.cells).indexOf(cell.closest('td'));
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    const target = nextRow.cells[colIndex].querySelector('.nav-target');
                    if (target) target.focus();
                }
            }
        });
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        
        let ws = 0; let wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            ws += (db[currentClass].students[sIdx].scores[i].g * (t.w/100));
            wu += (t.w/100);
        });
        document.getElementById(`final-${sIdx}`).innerText = (wu > 0 ? (ws/wu).toFixed(1) : 0) + "%";
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateSName(i, v) { db[currentClass].students[i].name = v; }

    function addAssignment() {
        db[currentClass].tasks.push({name: "NEW_VECTOR", w: 10});
        db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""}));
        render();
    }

    function addStudent() {
        db[currentClass].students.push({name: "NEW_SUBJECT", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))});
        render();
    }

    function deleteTask(i) { if(confirm("PURGE DATA VECTOR?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }

    function viewStats(idx) {
        const s = db[currentClass].students[idx];
        document.getElementById('ana-panel').style.display = 'grid';
        document.getElementById('ana-name').innerText = s.name.toUpperCase();
        document.getElementById('ana-final').innerText = document.getElementById(`final-${idx}`).innerText;
        document.getElementById('ana-comments').innerText = "LOGS: " + s.scores.map(x => x.n).filter(n => n && n !== "ANEKDOTAL_LOG...").join(" // ");

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('hudBarChart').getContext('2d');
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: db[currentClass].tasks.map(t => t.name),
                datasets: [{
                    label: 'VECTOR_SCORE',
                    data: s.scores.map(g => g.g),
                    backgroundColor: 'rgba(0, 242, 255, 0.4)',
                    borderColor: '#00f2ff',
                    borderWidth: 2,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        min: 0, max: 100,
                        grid: { color: 'rgba(0, 242, 255, 0.1)' },
                        ticks: { 
                            stepSize: 5, 
                            color: '#00f2ff', 
                            font: { family: 'Orbitron', size: 10 } 
                        }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#00f2ff', font: { family: 'Orbitron', size: 10 } }
                    }
                }
            }
        });
        document.getElementById('ana-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() { localStorage.setItem('tech_hud_v10', JSON.stringify(db)); alert("SYSTEM_SYNC_SUCCESSFUL"); }
    window.onload = render;
</script>
</body>
</html>
