<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMark Elite // HUD Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-deep: #05070a;
            --glass: rgba(0, 242, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
            --text: #e2e8f0;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        nav { 
            width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-right: 1px solid var(--border); padding: 2rem; display: flex; flex-direction: column;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 3rem; font-size: 1rem; }
        .nav-btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid transparent;
            color: #94a3b8; cursor: pointer; text-align: left; border-radius: 8px; font-weight: 600;
        }
        .active-nav { border-color: var(--neon-cyan); color: var(--neon-cyan); background: var(--glass); }

        /* Main Workspace */
        main { flex: 1; padding: 3rem; overflow-y: auto; background: linear-gradient(180deg, rgba(0,242,255,0.02) 0%, transparent 100%); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-size: 1.5rem; }

        /* The Grid */
        .glass-card { 
            background: rgba(10, 15, 24, 0.7); border: 1px solid var(--border); 
            border-radius: 4px; padding: 2rem; margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,242,255,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 0.65rem; color: var(--neon-cyan); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        
        /* HUD Inputs */
        .grade-box { border-left: 2px solid var(--border); padding-left: 10px; margin: 5px 0; }
        [contenteditable] { outline: none; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 2px; }
        [contenteditable]:focus { background: rgba(0,242,255,0.1); border-bottom: 1px solid var(--neon-cyan); }
        
        .score-val { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; width: 60px; text-align: center; }
        .note-val { font-size: 0.7rem; color: #64748b; min-width: 150px; display: block; margin-top: 4px; }
        
        .final-val { font-family: 'Orbitron'; color: var(--neon-magenta); font-weight: 700; text-shadow: 0 0 8px var(--neon-magenta); }

        /* Buttons */
        .btn { padding: 10px 20px; border-radius: 2px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

        /* HUD Graph Analytics */
        .hud-ana-grid { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: center; }
        .scanline { position: relative; overflow: hidden; border: 1px solid var(--border); background: #000; padding: 20px; border-radius: 8px; }
        .scanline::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); pointer-events: none; }
        
        .big-stat { font-family: 'Orbitron'; font-size: 4rem; color: var(--neon-cyan); margin: 0; }
        .delete-btn { color: #ff4d4d; opacity: 0.3; cursor: pointer; float: right; font-size: 0.8rem; }
        .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ELITE_SYSTEMS // v9.0</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">LINK: TEJ3M</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">LINK: TDJ1O</button>
    </div>
    <button class="btn" style="width: 100%;" onclick="saveData()">[ SYNC_TO_CLOUD ]</button>
</nav>

<main>
    <div class="header">
        <h1 id="view-title">COMPUTER_ENGINEERING</h1>
        <div style="display:flex; gap:10px">
            <button class="btn" onclick="addAssignment()">+ ADD_PROJ</button>
            <button class="btn" onclick="addStudent()">+ ADD_STU</button>
        </div>
    </div>

    <div class="glass-card">
        <table id="grade-table">
            <thead id="t-head"></thead>
            <tbody id="t-body"></tbody>
        </table>
    </div>

    <div id="ana-panel" class="glass-card" style="display:none; border-color: var(--neon-magenta);">
        <div class="hud-ana-grid">
            <div>
                <span style="font-size:0.6rem; color:var(--neon-magenta); font-weight:700;">VECTOR_ANALYSIS</span>
                <h2 id="ana-name" style="margin:5px 0; font-weight:400; font-family:'Orbitron';">SUBJECT_01</h2>
                <div class="big-stat" id="ana-final">0%</div>
                <p id="ana-note-summary" style="font-size:0.75rem; color:#64748b; margin-top:10px;"></p>
            </div>
            <div class="scanline">
                <canvas id="hudChart" height="280"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let myChart = null;

    let db = JSON.parse(localStorage.getItem('tech_hud_v9')) || {
        'TEJ3M': {
            tasks: [{name: "OSI_MODEL", w: 20}, {name: "ROUTER_CONFIG", w: 30}],
            students: [{name: "Marcus Vane", scores: [{g: 85, n: "Logical approach"}, {g: 90, n: "Flawless subnetting"}]}]
        },
        'TDJ1O': {
            tasks: [{name: "ISO_SKETCH", w: 40}],
            students: [{name: "Elena Rodriguez", scores: [{g: 92, n: "Perfect line weights"}]}]
        }
    };

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('ana-panel').style.display = 'none';
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('t-head');
        const body = document.getElementById('t-body');

        // Header
        let hHTML = `<tr><th>Personnel</th>`;
        course.tasks.forEach((t, i) => {
            hHTML += `<th>
                <span class="delete-btn" onclick="deleteTask(${i})">[X]</span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-cyan); font-size:0.6rem" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}%</div>
            </th>`;
        });
        hHTML += `<th>Current_Standing</th><th></th></tr>`;
        head.innerHTML = hHTML;

        // Rows
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rHTML = `<td contenteditable="true" class="nav-cell" onblur="updateSName(${sIdx},this.innerText)" style="font-weight:700; color:var(--neon-cyan)">${s.name}</td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rHTML += `<td>
                    <div class="grade-box">
                        <div contenteditable="true" class="score-val nav-cell" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                        <div contenteditable="true" class="note-val" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "NOTES..."}</div>
                    </div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            rHTML += `<td class="final-val" id="final-${sIdx}">${final}%</td>`;
            rHTML += `<td><button class="btn" style="font-size:0.5rem; padding:4px 8px;" onclick="viewStats(${sIdx})">DIAGNOSTICS</button></td>`;
            
            tr.innerHTML = rHTML;
            body.appendChild(tr);
        });

        setupEnterKey();
    }

    function setupEnterKey() {
        const table = document.getElementById('grade-table');
        table.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cell = e.target;
                const row = cell.closest('tr');
                const colIndex = Array.from(row.cells).indexOf(cell.closest('td'));
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    const target = nextRow.cells[colIndex].querySelector('[contenteditable]');
                    if (target) target.focus();
                }
            }
        });
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        
        let ws = 0; let wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            ws += (db[currentClass].students[sIdx].scores[i].g * (t.w/100));
            wu += (t.w/100);
        });
        document.getElementById(`final-${sIdx}`).innerText = (wu > 0 ? (ws/wu).toFixed(1) : 0) + "%";
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateSName(i, v) { db[currentClass].students[i].name = v; }

    function addAssignment() {
        db[currentClass].tasks.push({name: "NEW_VECTOR", w: 10});
        db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""}));
        render();
    }

    function addStudent() {
        db[currentClass].students.push({name: "NEW_SUBJECT", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))});
        render();
    }

    function deleteTask(i) { if(confirm("DELETE VECTOR DATA?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }

    function viewStats(idx) {
        const s = db[currentClass].students[idx];
        document.getElementById('ana-panel').style.display = 'block';
        document.getElementById('ana-name').innerText = s.name.toUpperCase();
        document.getElementById('ana-final').innerText = document.getElementById(`final-${idx}`).innerText;
        document.getElementById('ana-note-summary').innerText = s.scores.map(x => x.n).filter(n => n && n !== "NOTES...").join(" | ");

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('hudChart').getContext('2d');
        
        // HUD Glow Gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 242, 255, 0.3)');
        gradient.addColorStop(1, 'rgba(188, 19, 254, 0.05)');

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: db[currentClass].tasks.map(t => t.name),
                datasets: [{
                    label: 'VECTOR_STRENGTH',
                    data: s.scores.map(g => g.g),
                    borderColor: '#00f2ff',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#bc13fe',
                    pointRadius: 6,
                    pointHoverRadius: 10,
                    tension: 0.1, // Sharper tech-look
                    fill: true,
                    backgroundColor: gradient
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        min: 0, max: 100, 
                        grid: { color: 'rgba(0, 242, 255, 0.1)' },
                        ticks: { color: '#00f2ff', font: { family: 'Orbitron', size: 10 } }
                    },
                    x: { 
                        grid: { color: 'rgba(0, 242, 255, 0.1)' },
                        ticks: { color: '#00f2ff', font: { family: 'Orbitron', size: 10 } }
                    }
                }
            }
        });
        document.getElementById('ana-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() { localStorage.setItem('tech_hud_v9', JSON.stringify(db)); alert("DATA_SYNC_COMPLETE"); }
    window.onload = render;
</script>
</body>
</html>
