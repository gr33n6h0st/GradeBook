<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMark Pro | Dynamic Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --sidebar: #ffffff; --text: #0f172a; --border: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); }
        
        /* Sidebar */
        nav { width: 280px; height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem; position: fixed; box-sizing: border-box; }
        .nav-btn { width: 100%; padding: 14px; margin-bottom: 10px; background: transparent; border: none; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 600; color: #64748b; }
        .active-nav { background: #e0e7ff; color: var(--primary); }

        /* Content */
        main { margin-left: 280px; padding: 3rem; width: 100%; max-width: 1300px; }
        .card { background: #fff; border-radius: 20px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 2rem; }
        
        /* Table Layout */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        /* Inputs & Buttons */
        .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #64748b; margin-right: 8px; }
        .btn-danger { background: #fee2e2; color: #ef4444; font-size: 0.7rem; }
        
        [contenteditable="true"] { outline: none; padding: 4px; border-radius: 4px; transition: 0.2s; }
        [contenteditable="true"]:focus { background: #f5f3ff; color: var(--primary); }

        /* Analytics View */
        .analytics-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
    </style>
</head>
<body>

<nav>
    <h2 style="color: var(--primary); margin-bottom: 2rem;">TechMark Pro</h2>
    <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">Comp Eng (TEJ3M)</button>
    <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">Tech Design (TDJ1O)</button>
    <div style="margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 2rem;">
        <button class="btn btn-primary" style="width: 100%;" onclick="saveToDisk()">💾 Save All Data</button>
    </div>
</nav>

<main>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
            <h1 id="view-title" style="margin:0;">Class Gradebook</h1>
            <p id="view-code" style="color: #64748b; margin: 5px 0 0;">TEJ3M</p>
        </div>
        <div>
            <button class="btn btn-outline" onclick="addAssignment()">+ Add Assignment</button>
            <button class="btn btn-primary" onclick="addStudent()">+ Add Student</button>
        </div>
    </div>

    <div class="card">
        <div class="table-container">
            <table id="main-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="analytics" class="card" style="display:none;">
        <div class="analytics-grid">
            <div id="student-info" style="text-align: center; border-right: 1px solid var(--border);"></div>
            <canvas id="gradeChart" height="120"></canvas>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let chartObj = null;

    // Data Structure: Assignments list + Student list
    let data = JSON.parse(localStorage.getItem('techmark_v3')) || {
        'TEJ3M': {
            assignments: ["Breadboard Intro", "Safety Quiz", "Arduino Project"],
            students: [{ name: "Marcus Vane", grades: [85, 90, 88] }]
        },
        'TDJ1O': {
            assignments: ["Sketching 101", "CAD Model"],
            students: [{ name: "Elena Rodriguez", grades: [92, 84] }]
        }
    };

    function switchClass(code) {
        currentClass = code;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-' + code).classList.add('active-nav');
        document.getElementById('view-code').innerText = code;
        document.getElementById('analytics').style.display = 'none';
        render();
    }

    function render() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        const course = data[currentClass];

        // 1. Render Header
        let headHTML = `<tr><th>Student Name</th>`;
        course.assignments.forEach((assign, idx) => {
            headHTML += `<th>
                <div contenteditable="true" onblur="updateAssignName(${idx}, this.innerText)">${assign}</div>
                <button class="btn-danger" onclick="deleteAssignment(${idx})" style="padding:2px 5px; margin-top:5px;">×</button>
            </th>`;
        });
        headHTML += `<th>Final Avg</th><th>Actions</th></tr>`;
        head.innerHTML = headHTML;

        // 2. Render Rows
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let rowHTML = `<td contenteditable="true" onblur="updateStudentName(${sIdx}, this.innerText)">${s.name}</td>`;
            
            let sum = 0;
            course.assignments.forEach((_, aIdx) => {
                let grade = s.grades[aIdx] || 0;
                sum += grade;
                rowHTML += `<td contenteditable="true" onblur="updateGrade(${sIdx}, ${aIdx}, this.innerText)">${grade}</td>`;
            });

            let avg = (sum / Math.max(course.assignments.length, 1)).toFixed(1);
            rowHTML += `<td style="font-weight:800; color:var(--primary)">${avg}%</td>`;
            rowHTML += `<td>
                <button class="btn btn-outline" style="font-size:0.7rem;" onclick="viewStats(${sIdx})">Analytics</button>
                <button class="btn-danger" onclick="deleteStudent(${sIdx})">Delete</button>
            </td>`;
            
            let tr = document.createElement('tr');
            tr.innerHTML = rowHTML;
            body.appendChild(tr);
        });
    }

    // Logic Functions
    function addAssignment() {
        data[currentClass].assignments.push("New Project");
        data[currentClass].students.forEach(s => s.grades.push(0));
        render();
    }

    function addStudent() {
        let emptyGrades = data[currentClass].assignments.map(() => 0);
        data[currentClass].students.push({ name: "New Student", grades: emptyGrades });
        render();
    }

    function updateGrade(sIdx, aIdx, val) {
        data[currentClass].students[sIdx].grades[aIdx] = parseFloat(val) || 0;
        render();
    }

    function updateAssignName(idx, val) {
        data[currentClass].assignments[idx] = val;
    }

    function updateStudentName(idx, val) {
        data[currentClass].students[idx].name = val;
    }

    function deleteStudent(idx) {
        if(confirm("Delete this student?")) {
            data[currentClass].students.splice(idx, 1);
            render();
        }
    }

    function deleteAssignment(idx) {
        if(confirm("Delete this entire project column?")) {
            data[currentClass].assignments.splice(idx, 1);
            data[currentClass].students.forEach(s => s.grades.splice(idx, 1));
            render();
        }
    }

    function viewStats(idx) {
        const s = data[currentClass].students[idx];
        const labels = data[currentClass].assignments;
        document.getElementById('analytics').style.display = 'block';
        document.getElementById('student-info').innerHTML = `
            <h3 style="margin:0;">${s.name}</h3>
            <p style="color:var(--primary); font-weight:800; font-size:2rem;">${(s.grades.reduce((a,b)=>a+b,0)/labels.length).toFixed(1)}%</p>
        `;

        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('gradeChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Mark History',
                    data: s.grades,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
        });
    }

    function saveToDisk() {
        localStorage.setItem('techmark_v3', JSON.stringify(data));
        alert("Data synced to browser memory!");
    }

    window.onload = render;
</script>
</body>
</html>
