<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteMark // Command Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --neon-amber: #ffb700;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-black: #05070a;
            --border: rgba(0, 242, 255, 0.15);
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-black); color: #fff; height: 100vh; overflow: hidden;
        }

        /* Sidebar Navigation */
        nav { 
            width: 260px; background: rgba(0,0,0,0.95); border-right: 1px solid var(--border);
            padding: 2rem; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--neon-cyan); margin-bottom: 3rem; letter-spacing: 2px; }
        .nav-btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid transparent;
            color: var(--text-dim); cursor: pointer; text-align: left; font-size: 0.85rem; border-radius: 4px;
        }
        .active-nav { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,242,255,0.05); }

        /* Main Theatre */
        main { flex: 1; padding: 2.5rem; overflow-y: auto; background: radial-gradient(circle at 50% 0%, #0d1621 0%, #05070a 100%); display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; margin: 0; }

        /* Matrix Elements */
        .matrix-wrapper { 
            flex: 1; overflow: hidden; display: flex; flex-direction: column;
            border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.4);
        }
        .scroll-container { overflow: auto; width: 100%; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
        
        /* Row Status: Fail Warning */
        .status-fail { background: rgba(255, 49, 49, 0.08) !important; transition: background 0.3s; }
        .status-fail .final-val { color: var(--neon-red) !important; text-shadow: 0 0 10px var(--neon-red); }

        /* Sticky Personnel Column */
        th:first-child, td:first-child { 
            position: sticky; left: 0; z-index: 10; 
            background: #080c14; width: 260px; border-right: 2px solid var(--neon-cyan);
            color: var(--neon-green); font-weight: 600;
        }
        
        th { padding: 20px; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon-cyan); border-bottom: 2px solid var(--border); position: relative; }

        /* Chromatic Inputs */
        [contenteditable] { outline: none; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border: 1px solid transparent; }
        .score-input { font-family: 'Orbitron'; color: var(--neon-amber); font-weight: 700; font-size: 1.2rem; text-align: center; }
        .score-input:focus { border-color: var(--neon-amber); background: rgba(255,183,0,0.08); }
        .comment-input { font-size: 0.75rem; color: var(--text-dim); font-style: italic; display: block; margin-top: 8px; min-width: 220px; }

        .final-val { font-family: 'Orbitron'; color: var(--neon-magenta); font-weight: 700; font-size: 1.3rem; text-align: center; min-width: 140px; }

        /* UI Buttons */
        .btn { padding: 10px 18px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.65rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .btn-diag { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        .btn-diag:hover { background: var(--neon-magenta); color: #fff; }

        /* Collapsible Diagnostics */
        .diag-container { 
            margin-top: 2rem; background: rgba(0,0,0,0.95); border: 2px solid var(--neon-magenta); 
            border-radius: 8px; display: none; overflow: hidden; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .diag-header { padding: 12px 20px; background: rgba(188, 19, 254, 0.15); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-magenta); }
        .diag-body { display: grid; grid-template-columns: 350px 1fr; gap: 2.5rem; padding: 2rem; }
        .close-btn { color: var(--neon-magenta); cursor: pointer; font-size: 1.5rem; font-weight: bold; }

        .del-x { position: absolute; top: 6px; right: 8px; color: var(--neon-red); cursor: pointer; opacity: 0.4; transition: 0.2s; }
        .del-x:hover { opacity: 1; }

        /* Scrollbar */
        .scroll-container::-webkit-scrollbar { height: 10px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        .scroll-container::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body>

<nav>
    <div class="logo">TERMINAL // v15.0</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">Computer Engineering</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">Technological Design</button>
    </div>
    <button class="btn" style="width: 100%; border-color: var(--neon-green); color: var(--neon-green);" onclick="saveData()">[ SYNC_TO_CLOUD ]</button>
</nav>

<main>
    <div class="header">
        <div>
            <h1>Command Matrix</h1>
            <p id="sub-node" style="color: var(--neon-green); font-size: 0.6rem; letter-spacing: 2px; margin-top: 5px;">NODE_ACCESS: COMPUTER ENGINEERING</p>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn" onclick="addAssignment()">+ ADD_VECTOR</button>
            <button class="btn" onclick="addStudent()">+ ADD_SUBJECT</button>
        </div>
    </div>

    <div class="matrix-wrapper">
        <div class="scroll-container">
            <table id="grade-matrix">
                <thead id="h-row"></thead>
                <tbody id="b-rows"></tbody>
            </table>
        </div>
    </div>

    <div id="diag-panel" class="diag-container">
        <div class="diag-header">
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-magenta);">DIAGNOSTIC_LOG_MODE</span>
            <span class="close-btn" onclick="closeDiagnostics()">×</span>
        </div>
        <div class="diag-body">
            <div>
                <h2 id="diag-name" style="margin:0 0 10px 0; font-weight:400; font-size:1.8rem;">---</h2>
                <div id="diag-final" style="font-family:'Orbitron'; font-size:4.5rem; color:var(--neon-magenta); line-height: 1;">0%</div>
                <div id="diag-logs" style="margin-top:25px; max-height: 250px; overflow-y: auto;"></div>
            </div>
            <div style="height:350px; background:rgba(0,0,0,0.5); padding:20px; border:1px solid rgba(188,19,254,0.3);">
                <canvas id="gradeChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let chartObj = null;

    let db = JSON.parse(localStorage.getItem('techmark_v15')) || {
        'TEJ3M': {
            tasks: [{name: "Digital Circuits", w: 40}, {name: "Network Defense", w: 60}],
            students: [{name: "Marcus Vane", scores: [{g: 82, n: "Understands signal flow."}, {g: 45, n: "Packet loss on final step."}]}]
        },
        'TDJ1O': {
            tasks: [{name: "CAD Blueprint", w: 100}],
            students: [{name: "Elena Rodriguez", scores: [{g: 92, n: "Professional tolerances."}]}]
        }
    };

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('sub-node').innerText = `NODE_ACCESS: ${id === 'TEJ3M' ? 'COMPUTER ENGINEERING' : 'TECHNOLOGICAL DESIGN'}`;
        closeDiagnostics();
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('h-row');
        const body = document.getElementById('b-rows');

        let hContent = `<tr><th>Subject Personnel</th>`;
        course.tasks.forEach((t, i) => {
            hContent += `<th style="width:250px">
                <span class="del-x" onclick="deleteTask(${i})">×</span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-green); font-size:0.6rem; margin-top:4px;" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}%_WEIGHT</div>
            </th>`;
        });
        hContent += `<th class="final-val" style="color:var(--neon-magenta)">Final_Average</th><th>Actions</th></tr>`;
        head.innerHTML = hContent;

        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rContent = `<td>
                <span class="del-x" style="left:5px; right:auto;" onclick="deleteStudent(${sIdx})">×</span>
                <div contenteditable="true" class="kb-nav" onblur="updateSName(${sIdx},this.innerText)">${s.name}</div>
            </td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rContent += `<td>
                    <div contenteditable="true" class="score-input kb-nav" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                    <div contenteditable="true" class="comment-input" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "Anecdotal evidence..."}</div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            if(final < 50) tr.classList.add('status-fail');

            rContent += `<td class="final-val" id="final-${sIdx}">${final}%</td>`;
            rContent += `<td><button class="btn btn-diag" onclick="viewDiagnostics(${sIdx})">View Diagnostics</button></td>`;
            
            tr.innerHTML = rContent;
            body.appendChild(tr);
        });
        setupEnterNav();
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        let ws = 0, wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            ws += (db[currentClass].students[sIdx].scores[i].g * (t.w/100));
            wu += (t.w/100);
        });
        let final = (wu > 0 ? (ws/wu).toFixed(1) : 0);
        const cell = document.getElementById(`final-${sIdx}`);
        cell.innerText = final + "%";
        
        const row = cell.closest('tr');
        if(final < 50) row.classList.add('status-fail'); else row.classList.remove('status-fail');
    }

    function setupEnterNav() {
        document.getElementById('grade-matrix').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const td = e.target.closest('td');
                const row = td.parentElement, colIndex = Array.from(row.cells).indexOf(td);
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    const target = nextRow.cells[colIndex].querySelector('.kb-nav');
                    if (target) target.focus();
                }
            }
        });
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateSName(i, v) { db[currentClass].students[i].name = v; }
    function addAssignment() { db[currentClass].tasks.push({name: "New Project", w: 10}); db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""})); render(); }
    function addStudent() { db[currentClass].students.push({name: "New Student", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))}); render(); }
    function deleteTask(i) { if(confirm("Purge vector?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }
    function deleteStudent(i) { if(confirm("Purge student?")) { db[currentClass].students.splice(i, 1); render(); } }

    function viewDiagnostics(idx) {
        const s = db[currentClass].students[idx];
        const tasks = db[currentClass].tasks;
        document.getElementById('diag-panel').style.display = 'block';
        document.getElementById('diag-name').innerText = s.name.toUpperCase();
        document.getElementById('diag-final').innerText = document.getElementById(`final-${idx}`).innerText;

        const logCont = document.getElementById('diag-logs');
        logCont.innerHTML = '';
        s.scores.forEach((score, i) => {
            if(score.n && score.n !== "Anecdotal evidence...") {
                logCont.innerHTML += `<div style="margin-bottom:12px; border-left:3px solid var(--neon-magenta); padding-left:12px;">
                    <div style="font-size:0.65rem; color:var(--neon-magenta); font-family:'Orbitron';">${tasks[i].name} — Score: ${score.g}%</div>
                    <div style="font-size:0.85rem; color:#fff; margin-top:2px;">${score.n}</div>
                </div>`;
            }
        });

        if(chartObj) chartObj.destroy();
        const ctx = document.getElementById('gradeChart').getContext('2d');
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tasks.map(t => t.name),
                datasets: [{
                    data: s.scores.map(g => g.g),
                    backgroundColor: 'rgba(188, 19, 254, 0.4)',
                    borderColor: '#bc13fe',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { stepSize: 5, color: '#bc13fe', font: { family: 'Orbitron' } } },
                    x: { ticks: { color: '#bc13fe', font: { family: 'Orbitron' } } }
                }
            }
        });
        document.getElementById('diag-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function closeDiagnostics() { document.getElementById('diag-panel').style.display = 'none'; }
    function saveData() { localStorage.setItem('techmark_v15', JSON.stringify(db)); alert("DATABASE_SYNC_SUCCESSFUL"); }
    window.onload = render;
</script>
</body>
</html>
