<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMark Elite | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --bg-black: #05070a;
            --border: rgba(0, 242, 255, 0.15);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.02);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            background: var(--bg-black); color: var(--text-main); height: 100vh; overflow: hidden;
        }

        /* Sidebar Navigation */
        nav { 
            width: 280px; background: rgba(0,0,0,0.95); border-right: 1px solid var(--border);
            padding: 2rem; display: flex; flex-direction: column; flex-shrink: 0;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-cyan); margin-bottom: 3rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav-btn { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid transparent;
            color: var(--text-dim); cursor: pointer; text-align: left; font-size: 0.85rem; border-radius: 4px;
        }
        .active-nav { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,242,255,0.05); }

        /* Workspace */
        main { flex: 1; padding: 3rem; overflow-y: auto; background-image: radial-gradient(circle at top right, #0a1018, #05070a); display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; flex-shrink: 0; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin: 0; text-transform: uppercase; }

        /* SCROLLABLE MATRIX FIX */
        .matrix-wrapper { 
            flex: 1; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
        }
        
        .scroll-container { 
            overflow: auto; 
            width: 100%;
        }

        table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
        
        /* Sticky Student Column */
        th:first-child, td:first-child { 
            position: sticky; 
            left: 0; 
            z-index: 10; 
            background: #080c14; /* Solid color to prevent see-through when scrolling */
            width: 250px;
            border-right: 1px solid var(--border);
        }
        
        th { 
            text-align: left; padding: 20px; font-size: 0.7rem; color: var(--neon-cyan); 
            text-transform: uppercase; border-bottom: 2px solid var(--border); 
            position: relative; white-space: nowrap;
        }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Deletion Trigger X */
        .delete-btn { 
            position: absolute; top: 6px; right: 8px; color: #ff4d4d; 
            cursor: pointer; opacity: 0; font-size: 0.75rem; transition: 0.2s;
        }
        .student-delete { left: 8px; right: auto; top: 50%; transform: translateY(-50%); }
        th:hover .delete-btn, td:hover .delete-btn { opacity: 0.6; }
        .delete-btn:hover { opacity: 1 !important; }

        /* Inputs */
        [contenteditable] { outline: none; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border: 1px solid transparent; }
        [contenteditable]:focus { background: rgba(0,242,255,0.08); border-color: var(--neon-cyan); }
        .score-input { font-family: 'Orbitron'; font-weight: 700; font-size: 1.1rem; text-align: center; width: 100%; }
        .comment-input { font-size: 0.75rem; color: var(--text-dim); font-style: italic; display: block; margin-top: 8px; min-width: 200px; }

        /* Result Styles */
        .average-cell { font-family: 'Orbitron'; color: var(--neon-magenta); font-weight: 700; font-size: 1.2rem; text-align: center; min-width: 120px; }
        .btn { padding: 10px 20px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; white-space: nowrap; }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Diagnostics */
        .diagnostics-area { margin-top: 2rem; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; background: rgba(0,0,0,0.8); border: 1px solid var(--neon-magenta); padding: 2rem; border-radius: 8px; flex-shrink: 0; }
        
        /* Custom Scrollbar */
        .scroll-container::-webkit-scrollbar { height: 10px; width: 10px; }
        .scroll-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        .scroll-container::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body>

<nav>
    <div class="logo">Terminal Gradebook</div>
    <div style="flex-grow: 1;">
        <button id="btn-TEJ3M" class="nav-btn active-nav" onclick="switchClass('TEJ3M')">Computer Engineering</button>
        <button id="btn-TDJ1O" class="nav-btn" onclick="switchClass('TDJ1O')">Technological Design</button>
    </div>
    <button class="btn" style="width: 100%;" onclick="saveData()">Save Database</button>
</nav>

<main>
    <div class="header">
        <div>
            <h1 id="view-title">Computer Engineering</h1>
            <p style="color: var(--neon-cyan); font-size: 0.65rem; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase;">Ontario Secondary Marking Standards</p>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn" onclick="addAssignment()">+ Add Assignment</button>
            <button class="btn" onclick="addStudent()">+ Add Student</button>
        </div>
    </div>

    <div class="matrix-wrapper">
        <div class="scroll-container">
            <table id="grade-matrix">
                <thead id="h-row"></thead>
                <tbody id="b-rows"></tbody>
            </table>
        </div>
    </div>

    <div id="diag-panel" class="diagnostics-area" style="display:none;">
        <div>
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon-magenta);">Student Diagnostics</span>
            <h2 id="diag-name" style="margin:10px 0; font-weight:400; font-size:1.8rem;">---</h2>
            <div id="diag-final" style="font-family:'Orbitron'; font-size:4rem; color:var(--neon-cyan);">0%</div>
            <div id="diag-logs" style="margin-top:20px; font-size:0.85rem; max-height: 200px; overflow-y: auto;"></div>
        </div>
        <div style="height:350px; background:#000; padding:20px; border:1px solid var(--border);">
            <canvas id="gradeChart"></canvas>
        </div>
    </div>
</main>

<script>
    let currentClass = 'TEJ3M';
    let chartObj = null;

    let db = JSON.parse(localStorage.getItem('techmark_v13')) || {
        'TEJ3M': {
            tasks: [{name: "Initial Project", w: 20}, {name: "Technical Lab", w: 30}],
            students: [{name: "Marcus Vane", scores: [{g: 85, n: "Consistent logic."}, {g: 90, n: "High efficiency."}]}]
        },
        'TDJ1O': {
            tasks: [{name: "Concept Design", w: 50}],
            students: [{name: "Elena Rodriguez", scores: [{g: 92, n: "Strong visual balance."}]}]
        }
    };

    function switchClass(id) {
        currentClass = id;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('btn-'+id).classList.add('active-nav');
        document.getElementById('diag-panel').style.display = 'none';
        render();
    }

    function render() {
        const course = db[currentClass];
        const head = document.getElementById('h-row');
        const body = document.getElementById('b-rows');

        // Header
        let hContent = `<tr><th>Student Personnel</th>`;
        course.tasks.forEach((t, i) => {
            hContent += `<th style="width:250px">
                <span class="delete-btn" onclick="deleteTask(${i})">×</span>
                <div contenteditable="true" onblur="updateTask(${i},'name',this.innerText)">${t.name}</div>
                <div style="color:var(--neon-cyan); font-size:0.6rem; margin-top:4px;" contenteditable="true" onblur="updateTask(${i},'w',this.innerText)">${t.w}% Weight</div>
            </th>`;
        });
        hContent += `<th class="average-cell">Weighted Average</th><th>Actions</th></tr>`;
        head.innerHTML = hContent;

        // Rows
        body.innerHTML = '';
        course.students.forEach((s, sIdx) => {
            let tr = document.createElement('tr');
            let wSum = 0; let wUsed = 0;

            let rContent = `<td>
                <span class="delete-btn student-delete" onclick="deleteStudent(${sIdx})">×</span>
                <div contenteditable="true" class="kb-nav" onblur="updateSName(${sIdx},this.innerText)" style="font-weight:600; color:var(--neon-cyan)">${s.name}</div>
            </td>`;
            
            course.tasks.forEach((t, tIdx) => {
                let data = s.scores[tIdx] || {g: 0, n: ""};
                wSum += (data.g * (t.w / 100));
                wUsed += (t.w / 100);
                rContent += `<td>
                    <div contenteditable="true" class="score-input kb-nav" oninput="liveUpdate(${sIdx},${tIdx},this.innerText)">${data.g}</div>
                    <div contenteditable="true" class="comment-input" onblur="updateNote(${sIdx},${tIdx},this.innerText)">${data.n || "Anecdotal evidence..."}</div>
                </td>`;
            });

            let final = wUsed > 0 ? (wSum / wUsed).toFixed(1) : 0;
            rContent += `<td class="average-cell" id="final-${sIdx}">${final}%</td>`;
            rContent += `<td><button class="btn" onclick="viewDiagnostics(${sIdx})">Diagnostics</button></td>`;
            
            tr.innerHTML = rContent;
            body.appendChild(tr);
        });

        setupEnterNav();
    }

    function setupEnterNav() {
        const table = document.getElementById('grade-matrix');
        table.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cell = e.target;
                const td = cell.closest('td');
                const row = td.parentElement;
                const colIndex = Array.from(row.cells).indexOf(td);
                const nextRow = row.nextElementSibling;
                if (nextRow) {
                    const target = nextRow.cells[colIndex].querySelector('.kb-nav');
                    if (target) target.focus();
                }
            }
        });
    }

    function liveUpdate(sIdx, tIdx, val) {
        let v = parseFloat(val) || 0;
        db[currentClass].students[sIdx].scores[tIdx].g = v;
        let ws = 0; let wu = 0;
        db[currentClass].tasks.forEach((t, i) => {
            ws += (db[currentClass].students[sIdx].scores[i].g * (t.w/100));
            wu += (t.w/100);
        });
        document.getElementById(`final-${sIdx}`).innerText = (wu > 0 ? (ws/wu).toFixed(1) : 0) + "%";
    }

    function updateNote(s, t, v) { db[currentClass].students[s].scores[t].n = v; }
    function updateTask(i, f, v) { db[currentClass].tasks[i][f] = f === 'w' ? (parseFloat(v) || 0) : v; render(); }
    function updateSName(i, v) { db[currentClass].students[i].name = v; }

    function addAssignment() {
        db[currentClass].tasks.push({name: "New Assignment", w: 10});
        db[currentClass].students.forEach(s => s.scores.push({g: 0, n: ""}));
        render();
    }

    function addStudent() {
        db[currentClass].students.push({name: "New Student", scores: db[currentClass].tasks.map(()=>({g:0, n:""}))});
        render();
    }

    function deleteTask(i) { if(confirm("Permanently delete assignment?")) { db[currentClass].tasks.splice(i, 1); db[currentClass].students.forEach(s => s.scores.splice(i, 1)); render(); } }
    function deleteStudent(i) { if(confirm("Permanently delete student?")) { db[currentClass].students.splice(i, 1); render(); } }

    function viewDiagnostics(idx) {
        const s = db[currentClass].students[idx];
        const tasks = db[currentClass].tasks;
        document.getElementById('diag-panel').style.display = 'grid';
        document.getElementById('diag-name').innerText = s.name;
        document.getElementById('diag-final').innerText = document.getElementById(`final-${idx}`).innerText;

        const logCont = document.getElementById('diag-logs');
        logCont.innerHTML = '';
        s.scores.forEach((score, i) => {
            if(score.n && score.n !== "Anecdotal evidence...") {
                logCont.innerHTML += `<div style="margin-bottom:10px; border-left:2px solid var(--neon-cyan); padding-left:10px;">
                    <div style="font-size:0.6rem; color:var(--neon-cyan); font-family:'Orbitron';">${tasks[i].name} (${score.g}%)</div>
                    <div>${score.n}</div>
                </div>`;
            }
        });

        if(chartObj) chartObj.destroy();
        const ctx = document.getElementById('gradeChart').getContext('2d');
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tasks.map(t => t.name),
                datasets: [{
                    data: s.scores.map(g => g.g),
                    backgroundColor: 'rgba(0, 242, 255, 0.4)',
                    borderColor: '#00f2ff',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { stepSize: 5, color: '#00f2ff', font: { family: 'Orbitron' } } },
                    x: { ticks: { color: '#00f2ff', font: { family: 'Orbitron' } } }
                }
            }
        });
        document.getElementById('diag-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() { localStorage.setItem('techmark_v13', JSON.stringify(db)); alert("Sync Success."); }
    window.onload = render;
</script>
</body>
</html>
